  files: []
  frontmatter_anchor: true
user_invocable: true
tools:
  - read/readFile
  - edit/createFile
  - edit/createDirectory
  - edit/editFiles
  - edit/rename
  - search/fileSearch
  - vscode/askQuestions
  - agent
subagents:
  - python-utility-engineer
dependencies: []
